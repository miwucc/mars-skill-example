<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Static Search Trigger</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #f7f9fc;
        color: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          linear-gradient(135deg, rgba(40, 116, 240, 0.14), transparent 34%),
          linear-gradient(315deg, rgba(243, 64, 127, 0.15), transparent 38%),
          #f7f9fc;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        display: grid;
        gap: 36px;
        justify-items: center;
      }

      .search-panel {
        width: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
      }

      label {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
      }

      input {
        min-width: 0;
        height: 52px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 0 16px;
        font-size: 17px;
        background: #ffffff;
        color: #172033;
        outline: none;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      input:focus {
        border-color: #2874f0;
        box-shadow:
          0 0 0 4px rgba(40, 116, 240, 0.14),
          0 12px 30px rgba(15, 23, 42, 0.08);
      }

      button {
        height: 52px;
        border: 0;
        border-radius: 8px;
        padding: 0 22px;
        font-size: 17px;
        font-weight: 700;
        color: #ffffff;
        background: #172033;
        cursor: pointer;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
      }

      button:focus-visible {
        outline: 4px solid rgba(40, 116, 240, 0.24);
        outline-offset: 3px;
      }

      .cat-container {
        width: 100%;
        height: 64px;
        position: relative;
        overflow: hidden;
      }

      .cat {
        position: absolute;
        top: 4px;
        left: 0;
        animation: catWalk 4s ease-in-out infinite;
        user-select: none;
        pointer-events: none;
      }

      .cat-svg {
        display: block;
        width: 100px;
        height: 56px;
        animation: catBob 0.5s ease-in-out infinite;
      }

      .cat-leg-front {
        transform-origin: 74px 36px;
        animation: legSwing 0.5s ease-in-out infinite;
      }

      .cat-leg-back {
        transform-origin: 34px 36px;
        animation: legSwing 0.5s ease-in-out 0.25s infinite;
      }

      .cat-tail-group {
        transform-origin: 22px 28px;
        animation: tailSwish 1.2s ease-in-out infinite;
      }

      .cat-eye {
        animation: blink 4s ease-in-out infinite;
        transform-origin: center;
      }

      @keyframes catWalk {
        0% {
          left: 0;
          transform: scaleX(1);
        }
        49% {
          left: calc(100% - 100px);
          transform: scaleX(1);
        }
        50% {
          left: calc(100% - 100px);
          transform: scaleX(-1);
        }
        99% {
          left: 0;
          transform: scaleX(-1);
        }
        100% {
          left: 0;
          transform: scaleX(1);
        }
      }

      @keyframes catBob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }

      @keyframes legSwing {
        0%, 100% { transform: rotate(-12deg); }
        50% { transform: rotate(12deg); }
      }

      @keyframes tailSwish {
        0%, 100% { transform: rotate(-8deg); }
        50% { transform: rotate(12deg); }
      }

      @keyframes blink {
        0%, 90%, 96%, 100% { transform: scaleY(1); }
        93% { transform: scaleY(0.1); }
      }

      .welcome-message {
        margin: 0;
        text-align: center;
        font-size: clamp(48px, 10vw, 112px);
        line-height: 1.05;
        font-weight: 950;
        letter-spacing: 0;
        background: linear-gradient(90deg, #ff3f8f, #ffb000, #20c997, #2874f0, #9b5cff);
        background-size: 320% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow:
          0 0 18px rgba(255, 63, 143, 0.42),
          0 0 32px rgba(40, 116, 240, 0.32),
          0 10px 34px rgba(15, 23, 42, 0.18);
        animation:
          gradientFlow 4s linear infinite,
          buoyantScale 2.6s ease-in-out infinite;
      }

      .is-hidden {
        display: none;
      }

      @keyframes gradientFlow {
        0% {
          background-position: 0% 50%;
        }
        100% {
          background-position: 320% 50%;
        }
      }

      @keyframes buoyantScale {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-8px) scale(1.035);
        }
      }

      @media (max-width: 560px) {
        .search-panel {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="cat-container">
        <div class="cat" aria-hidden="true">
          <svg class="cat-svg" viewBox="0 0 120 56" xmlns="http://www.w3.org/2000/svg">
            <g class="cat-tail-group">
              <path d="M22,28 Q6,22 4,10 Q3,0 14,6" stroke="#3a3a3a" fill="none" stroke-width="4.5" stroke-linecap="round"/>
            </g>
            <g class="cat-leg-back">
              <rect x="28" y="32" width="8" height="14" rx="3.5" fill="#3a3a3a"/>
              <ellipse cx="32" cy="46" rx="5" ry="3.5" fill="#3a3a3a"/>
            </g>
            <g class="cat-leg-front">
              <rect x="74" y="32" width="8" height="14" rx="3.5" fill="#3a3a3a"/>
              <ellipse cx="78" cy="46" rx="5" ry="3.5" fill="#3a3a3a"/>
            </g>
            <ellipse cx="54" cy="28" rx="30" ry="13" fill="#444"/>
            <ellipse cx="54" cy="26" rx="22" ry="8" fill="#555"/>
            <circle cx="90" cy="18" r="13" fill="#444"/>
            <polygon points="81,9 83,0 90,8" fill="#444"/>
            <polygon points="90,8 97,0 99,9" fill="#444"/>
            <polygon points="83,8 84.5,3 89,8" fill="#e8a0a0"/>
            <polygon points="91,8 95.5,3 97,8" fill="#e8a0a0"/>
            <ellipse class="cat-eye" cx="85" cy="17" rx="2.8" ry="3.2" fill="#fff"/>
            <ellipse class="cat-eye" cx="95" cy="17" rx="2.8" ry="3.2" fill="#fff"/>
            <ellipse cx="85.8" cy="17.5" rx="1.6" ry="2" fill="#172033"/>
            <ellipse cx="95.8" cy="17.5" rx="1.6" ry="2" fill="#172033"/>
            <polygon points="90,21 89,23.5 91,23.5" fill="#e8a0a0"/>
            <line x1="77" y1="19" x2="66" y2="17" stroke="#666" stroke-width="0.6" stroke-linecap="round"/>
            <line x1="77" y1="21" x2="66" y2="22" stroke="#666" stroke-width="0.6" stroke-linecap="round"/>
            <line x1="103" y1="19" x2="114" y2="17" stroke="#666" stroke-width="0.6" stroke-linecap="round"/>
            <line x1="103" y1="21" x2="114" y2="22" stroke="#666" stroke-width="0.6" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="search-panel">
        <label for="searchInput">搜索内容</label>
        <input id="searchInput" type="search" autocomplete="off" placeholder="输入任意内容" />
        <button id="searchButton" type="button">搜索</button>
      </div>

      <p id="welcomeMessage" class="welcome-message is-hidden" aria-hidden="true" hidden>
        welcome！good job！
      </p>
    </main>

    <script>
      const searchButton = document.getElementById("searchButton");
      const welcomeMessage = document.getElementById("welcomeMessage");

      function showWelcomeMessage() {
        welcomeMessage.textContent = "welcome！good job！";
        welcomeMessage.hidden = false;
        welcomeMessage.setAttribute("aria-hidden", "false");
        welcomeMessage.classList.remove("is-hidden");
      }

      searchButton.addEventListener("click", showWelcomeMessage);
    </script>
  </body>
</html>
